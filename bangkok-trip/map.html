* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { width: 100%; height: calc(100vh - 60px); }
.header {
  background: #1a1a2e; color: white; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.legend {
  display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-dot {
  width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.3);
}
.leaflet-popup-content { font-size: 13px; line-height: 1.5; min-width: 200px; }
.popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #1a1a2e; }
.popup-category { font-size: 11px; color: #666; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.popup-info { margin: 4px 0; }
.popup-info strong { color: #333; }
.popup-kid-yes { color: #2d8a4e; font-weight: 600; }
.popup-kid-warn { color: #d4a017; font-weight: 600; }
.popup-kid-no { color: #c0392b; font-weight: 600; }
.popup-transport { background: #f5f5f5; padding: 4px 8px; border-radius: 4px; margin-top: 6px; font-size: 12px; }
.area-badge {
  display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px;
  font-weight: 600; color: white; margin-left: 4px;
}
.area-ladprao { background: #6c5ce7; }
.area-khaoyai { background: #00b894; }
.area-peninsula { background: #e17055; }
.coord-note { font-size: 10px; color: #999; font-style: italic; }

  attribution: '&copy; OpenStreetMap contributors',

// Custom icon factory
function makeIcon(color, size) {
  size = size || 10;
  return L.divIcon({
    className: '',
    html: '<div style="width:'+size+'px;height:'+size+'px;background:'+color+';border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

var hotelIcon = makeIcon('#e74c3c', 18);
var restaurantIcon = makeIcon('#e67e22', 12);
var cafeIcon = makeIcon('#f1c40f', 10);
var spaIcon = makeIcon('#27ae60', 10);
var activityIcon = makeIcon('#3498db', 12);
var mallIcon = makeIcon('#555', 10);

var restaurantLayer = L.layerGroup();
var cafeLayer = L.layerGroup();
var spaLayer = L.layerGroup();
var activityLayer = L.layerGroup();
var mallLayer = L.layerGroup();

// Area layer groups
var ladpraoLayer = L.layerGroup();
var khaoyaiLayer = L.layerGroup();
var peninsulaLayer = L.layerGroup();

function popup(name, category, area, kidStatus, kidText, reason, transport) {
  var areaCls = area === '北曼谷' ? 'area-ladprao' : area === '考艾' ? 'area-khaoyai' : 'area-peninsula';
  var kidCls = kidStatus === 'yes' ? 'popup-kid-yes' : kidStatus === 'warn' ? 'popup-kid-warn' : 'popup-kid-no';
  var kidIcon = kidStatus === 'yes' ? '✅' : kidStatus === 'warn' ? '⚠️' : '❌';
  return '<div class="popup-title">' + name + ' <span class="area-badge ' + areaCls + '">' + area + '</span></div>' +
    '<div class="popup-category">' + category + '</div>' +
    '<div class="popup-info"><span class="' + kidCls + '">' + kidIcon + ' ' + kidText + '</span></div>' +
    '<div class="popup-info"><strong>推荐：</strong>' + reason + '</div>' +
    (transport ? '<div class="popup-transport">🚗 ' + transport + '</div>' : '');
}

function addMarker(lat, lng, icon, categoryLayer, areaLayer, popupHtml) {
  var m = L.marker([lat, lng], {icon: icon}).bindPopup(popupHtml);
  categoryLayer.addLayer(m);
  areaLayer.addLayer(m);
  return m;
}
