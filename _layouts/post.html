---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.lang_pair %}
        <span class="lang-switch">
          {% if page.lang == 'zh' %}
            <a href="{{ page.lang_pair | relative_url }}">日本語版 →</a>
          {% else %}
            <a href="{{ page.lang_pair | relative_url }}">中文版 →</a>
          {% endif %}
        </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<nav class="post-nav">
  <a href="{{ page.lang == 'ja' ? '/ja/' : '/zh/' | relative_url }}">← 返回列表</a>
</nav>
